<!DOCTYPE html>
<html lang="en">
<head><link rel="icon" type="image/png" href="/favicon.png" /><link rel="shortcut icon" href="/favicon.png" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SachAI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent-rgb: 245, 158, 11;
  --bg: #020617;
  --grid-opacity: 0.04;
}

html, body, #root {
  height: 100%;
  margin: 0;
}

body {
  background: #020617;
  color: #f8fafc;
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

.ambient-glow {
  position: fixed;
  top: 0;
  right: 0;
  width: 70vw;
  height: 70vw;
  background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
  z-index: -1;
}

.neural-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(245,158,11,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(245,158,11,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -2;
}
</style>
</head>

<body>
  <div class="ambient-glow"></div>
  <div class="neural-grid"></div>

  <div id="root"></div>

  <!-- React mounts here (flat root project) -->
  <script type="module" src="/index.jsx"></script>
</body>
</html>
